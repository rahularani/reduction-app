services:
  - type: web
    name: food-waste-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DB_DIALECT
        value: postgres
      - key: DB_HOST
        fromDatabase:
          name: foodwastedb
          property: host
      - key: DB_USER
        fromDatabase:
          name: foodwastedb
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: foodwastedb
          property: password
      - key: DB_NAME
        fromDatabase:
          name: foodwastedb
          property: database
      - key: DB_PORT
        value: 5432
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

databases:
  - name: foodwastedb
    databaseName: foodwastedb_iyx7
    user: foodwastedb_iyx7_user
    region: oregon
    plan: free
